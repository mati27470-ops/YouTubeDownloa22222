name: 🚀 GitHub-Only Universal Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 Video/Page URL'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50

env:
  PYTHONUNBUFFERED: '1'

jobs:
  download-and-push:
    name: 📥 Download & Push to Repo
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: ⚡ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🔄 Install & Force Update yt-dlp
        run: |
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          echo "✨ yt-dlp updated to version:"
          yt-dlp --version
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)

      - name: 🎯 Download & Process
        env:
          URL: ${{ github.event.inputs.url }}
          TYPE: ${{ github.event.inputs.type }}
          SPLIT: ${{ github.event.inputs.split_threshold_mb }}
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess, uuid
          from pathlib import Path
          from datetime import datetime

          U = os.environ['URL']
          T = os.environ['TYPE']
          SP = int(os.environ.get('SPLIT', '50'))

          timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
          short_id = uuid.uuid4().hex[:6]
          file_base_name = f"file_{timestamp}_{short_id}"

          output_dir = Path('downloads')
          output_dir.mkdir(exist_ok=True)
          out_template = str(output_dir / f"{file_base_name}.%(ext)s")

          # دستور دانلود پیشرفته همراه با هدرهای شبیه‌ساز مرورگر و آپدیت برای دور زدن خطاها
          dl_cmd = [
              'yt-dlp',
              '--no-warnings',
              '--no-check-certificate',
              '--user-agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              '--referer', 'https://www.google.com/',
              '--add-header', 'Accept-Language: en-US,en;q=0.9',
              '-o', out_template
          ]

          if T == 'audio':
              dl_cmd.extend(['-x', '--audio-format', 'mp3', '--audio-quality', '0'])
          else:
              dl_cmd.extend(['-f', 'bv*[ext=mp4]+ba[ext=m4a]/b[ext=mp4]/bv+ba/b'])

          dl_cmd.append(U)

          print(f"📥 Downloading directly from: {U}")
          res = subprocess.run(dl_cmd)
          if res.returncode != 0:
              print("❌ Download failed.")
              sys.exit(1)

          downloaded_files = list(output_dir.glob(f"{file_base_name}.*"))
          if not downloaded_files:
              print("❌ File not found.")
              sys.exit(1)

          fp = downloaded_files[0]
          size_mb = fp.stat().st_size / 1e6
          print(f"✅ Successfully downloaded: {fp.name} ({size_mb:.2f} MB)")

          if SP > 0 and size_mb > SP:
              print(f"✂️ Splitting into {SP}MB parts...")
              subprocess.run(['zip', '-r', '-q', '-s', f'{SP}m', f'{fp.name}.zip', fp.name], cwd=output_dir, check=True)
              fp.unlink()
              print("✅ File split completed.")

          PYEOF

      - name: 📤 Push Files to GitHub Repo
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 PUSHING TO GITHUB REPOSITORY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          git add downloads/*
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No new files found to push."
            exit 0
          fi
          
          git commit -m "📦 Media Downloaded [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ DONE!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "   ❌ Push failed"
          exit 1
