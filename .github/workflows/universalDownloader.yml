name: 🚀 GitHub-Only Universal Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 Video/Page URL (Supports 1000+ sites)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 40

env:
  PYTHONUNBUFFERED: '1'

jobs:
  download-and-push:
    name: 📥 Download & Push to Repo
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - name: ⚡ Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🔄 Install Tools (FFmpeg, RAR) & Update yt-dlp
        run: |
          sudo apt-get update -qq
          # اضافه کردن rar به ابزارهای لینوکس
          sudo apt-get install -y -qq ffmpeg wget rar
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          echo "✨ yt-dlp version:"
          yt-dlp --version

      - name: 🎯 Universal Download & RAR Split Process
        env:
          URL: ${{ github.event.inputs.url }}
          TYPE: ${{ github.event.inputs.type }}
          SPLIT: ${{ github.event.inputs.split_threshold_mb }}
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess, uuid, glob
          from pathlib import Path
          from datetime import datetime

          U = os.environ['URL']
          T = os.environ['TYPE']
          SP = int(os.environ.get('SPLIT', '40'))

          timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
          short_id = uuid.uuid4().hex[:6]
          file_base_name = f"media_{timestamp}_{short_id}"

          output_dir = Path('downloads')
          output_dir.mkdir(exist_ok=True)
          
          out_template = str(output_dir / f"{file_base_name}.%(ext)s")

          dl_cmd = [
              'yt-dlp',
              '--no-warnings',
              '--no-check-certificate',
              '--prefer-free-formats',
              '--use-extractors', 'generic,default',
              '--user-agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
              '--referer', 'https://www.google.com/',
              '-o', out_template
          ]

          if T == 'audio':
              dl_cmd.extend(['-x', '--audio-format', 'mp3', '--audio-quality', '0'])
          else:
              dl_cmd.extend(['-f', 'bv*+ba/b'])

          dl_cmd.append(U)

          print(f"📥 Starting universal download for: {U}")
          res = subprocess.run(dl_cmd)
          if res.returncode != 0:
              print("❌ Download failed by yt-dlp.")
              sys.exit(1)

          downloaded_files = list(output_dir.glob(f"{file_base_name}.*"))
          if not downloaded_files:
              print("❌ Downloaded file not found on disk.")
              sys.exit(1)

          fp = downloaded_files[0]
          size_mb = fp.stat().st_size / 1e6
          print(f"✅ Successfully downloaded: {fp.name} ({size_mb:.2f} MB)")

          # بخش پارت‌بندی با فرمت استاندارد RAR
          if SP > 0 and size_mb > SP:
              print(f"✂️ Splitting {fp.name} into {SP}MB RAR parts...")
              
              # a: ساخت آرشیو | -m0: بدون فشرده‌سازی برای سرعت بالا | -v40m: پارت‌های 40 مگابایتی
              rar_cmd = ['rar', 'a', f'-v{SP}m', '-m0', f'{fp.name}.rar', fp.name]
              rar_res = subprocess.run(rar_cmd, cwd=output_dir)
              
              if rar_res.returncode == 0:
                  fp.unlink() # حذف فایل اصلی بعد از ساخت موفق پارت‌های RAR
                  print("✅ Secure RAR split completed.")
              else:
                  print("⚠️ Warning: RAR splitting failed, keeping original file.")

          PYEOF

      - name: 📤 Push Files to GitHub Repo
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 PUSHING TO GITHUB REPOSITORY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          git add downloads/*
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ No new files found to push."
            exit 0
          fi
          
          git commit -m "📦 Media Downloaded as RAR [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ DONE!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*5))
          done
          echo "   ❌ Push failed"
          exit 1
